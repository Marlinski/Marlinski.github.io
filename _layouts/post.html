<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div id="container">
    <header>
      <div id="identity">
        <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" id="avatar">
        <div>
          <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
          <p id="tagline">{{ site.description }}</p>
        </div>
      </div>
      <nav>
        <a href="{{ '/' | relative_url }}">~/</a>
        <a href="{{ '/blog' | relative_url }}">blog</a>
        <a href="{{ '/public' | relative_url }}">public</a>
      </nav>
      <div id="links">
        <a href="https://github.com/{{ site.github_username }}" target="_blank">github</a>
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank">linkedin</a>
        <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank">twitter</a>
      </div>
    </header>

    <main>
      <article>
        <div class="post-header">
          <h2 class="post-title">{{ page.title }}</h2>
          <time class="post-date">{{ page.date | date: "%Y-%m-%d" }}</time>
        </div>
        <div class="post-content">
          {{ content }}
        </div>
      </article>
      <div class="post-footer">
        <a href="{{ '/blog' | relative_url }}">← back to blog</a>
      </div>
    </main>

    <footer>
      <span>marlinski.org</span>
    </footer>
  </div>
</body>
</html>
